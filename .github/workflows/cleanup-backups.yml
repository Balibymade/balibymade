name: Clean old backups

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC — 30 min después del backup diario
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete backups older than 60 days
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.SUPABASE_S3_REGION }}
        run: |
          CUTOFF=$(date -d "60 days ago" +%Y-%m-%d)
          aws s3 ls s3://${{ secrets.SUPABASE_STORAGE_BUCKET }}/backups/ \
            --endpoint-url ${{ secrets.SUPABASE_S3_ENDPOINT }} \
            | awk '{print $4}' \
            | while read key; do
                DATE=$(echo "$key" | grep -oP '\d{4}-\d{2}-\d{2}')
                if [[ -n "$DATE" && "$DATE" < "$CUTOFF" ]]; then
                  echo "Deleting old backup: $key"
                  aws s3 rm s3://${{ secrets.SUPABASE_STORAGE_BUCKET }}/backups/$key \
                    --endpoint-url ${{ secrets.SUPABASE_S3_ENDPOINT }}
                fi
              done
