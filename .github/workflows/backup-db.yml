name: Backup PostgreSQL database

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC diario
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          pg_dump "$DATABASE_URL" --no-owner --no-acl --format=plain | gzip > backup-${DATE}.sql.gz

      - name: Upload to Supabase S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.SUPABASE_S3_REGION }}
        run: |
          aws s3 cp backup-$(date +%Y-%m-%d).sql.gz \
            s3://${{ secrets.SUPABASE_STORAGE_BUCKET }}/backups/backup-$(date +%Y-%m-%d).sql.gz \
            --endpoint-url ${{ secrets.SUPABASE_S3_ENDPOINT }}

      - name: Clean up local file
        run: rm -f backup-*.sql.gz
