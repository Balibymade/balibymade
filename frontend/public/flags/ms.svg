  <rect y="2.14" width="60" height="2.14" fill="#FFFFFF"/>
  <rect y="6.42" width="60" height="2.14" fill="#FFFFFF"/>
  <rect y="10.70" width="60" height="2.14" fill="#FFFFFF"/>
  <rect y="14.98" width="60" height="2.14" fill="#FFFFFF"/>
  <rect y="19.26" width="60" height="2.14" fill="#FFFFFF"/>
  <rect y="23.54" width="60" height="2.14" fill="#FFFFFF"/>
  <rect y="27.82" width="60" height="2.18" fill="#FFFFFF"/>
